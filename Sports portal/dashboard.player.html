<!DOCTYPE html>
<html>
<head>
    <title>Player Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
    <h1>🏏 Sports Portal</h1>
    <div class="nav-right">
        <span id="username-label"></span>
        <span id="role-badge" class="role-badge"></span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="dashboard">
    <h1>Player Dashboard</h1>

    <!-- Own Stats -->
    <div class="card">
        <h3>My Stats</h3>
        <div id="my-stats"></div>
    </div>

    <!-- Own Fee Status -->
    <div class="card">
        <h3>My Fee Status</h3>
        <div id="fee-status"></div>
    </div>

    <!-- Upcoming Matches (view only) -->
    <div class="card">
        <h3>Upcoming Matches</h3>
        <div id="matches-list"></div>
    </div>

    <!-- Announcements (view only) -->
    <div class="card">
        <h3>Announcements</h3>
        <div id="announcements-list"></div>
    </div>

</div>

<script src="script.js"></script>
<script>
    requireLogin("player");
    renderNavbar();
    renderOwnStats();
    renderFeeForLinkedPlayer();
    renderMatches();
    renderAnnouncements();
</script>

</body>
</html>
