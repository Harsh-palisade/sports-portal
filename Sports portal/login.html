<!DOCTYPE html>
<html>
<head>
    <title>Sports Portal Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-page">
    <div class="login-container">
        <img src="assets/logo.png" class="logo" alt="logo">
        <h1 class="login-title">🏏 Sports Portal</h1>
        <p class="login-subtitle">Cricket Management System</p>

        <div class="login-form">
            <label class="input-label">I am a...</label>
            <select id="role">
                <option value="coach">Coach</option>
                <option value="parent">Parent</option>
                <option value="player">Player</option>
            </select>

            <label class="input-label">Username</label>
            <input type="text" id="username" placeholder="Enter your username">

            <label class="input-label">Password</label>
            <input type="password" id="password" placeholder="Enter your password">

            <button onclick="login()">Login</button>
        </div>

        <p class="login-footer">Enter your team credentials to continue</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
