<!DOCTYPE html>
<html>
<head>
    <title>Coach Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
    <h1>🏏 Sports Portal</h1>
    <div class="nav-right">
        <span id="username-label"></span>
        <span id="role-badge" class="role-badge"></span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="dashboard">
    <h1>Coach Dashboard</h1>

    <!-- Upcoming Matches -->
    <div class="card">
        <h3>Upcoming Matches</h3>
        <div id="matches-list"></div>

        <hr style="border-color: rgba(255,255,255,0.15); margin: 16px 0;">

        <h3>Add New Match</h3>
        <input type="text" id="new-opponent" placeholder="Opponent team">
        <input type="date" id="new-date">
        <input type="text" id="new-venue" placeholder="Venue">
        <button onclick="addMatch()">Add Match</button>
    </div>

    <!-- Team Roster -->
    <div class="card">
        <h3>Team Roster</h3>
        <div id="roster-list"></div>

        <hr style="border-color: rgba(255,255,255,0.15); margin: 16px 0;">

        <h3>Add New Player</h3>
        <input type="text" id="new-player-name" placeholder="Player name">
        <button onclick="addPlayer()">Add Player</button>
    </div>

    <!-- Fees -->
    <div class="card">
        <h3>Fees Management</h3>
        <div id="fees-list"></div>
    </div>

    <!-- Announcements -->
    <div class="card">
        <h3>Announcements</h3>
        <div id="announcements-list"></div>

        <hr style="border-color: rgba(255,255,255,0.15); margin: 16px 0;">

        <h3>Post Announcement</h3>
        <input type="text" id="new-announcement" placeholder="Write an announcement...">
        <button onclick="postAnnouncement()">Post</button>
    </div>

</div>

<script src="script.js"></script>
<script>
    requireLogin("coach");
    renderNavbar();
    renderMatches();
    renderRoster();
    renderFeesCoach();
    renderAnnouncements();
</script>

</body>
</html>
